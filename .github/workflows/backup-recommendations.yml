name: Backup recommendation database

on:
  schedule:
    - cron: '0 0 * * *'
      timezone: Asia/Tokyo
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recommendation-database-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Back up recommendation tables
        run: python script/backup_recommendations.py
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_RETENTION_DAYS: '14'
