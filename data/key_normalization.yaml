# User-yaml key normalization aliases.
#
# Some user yaml keys mix CHT characters into JP-key fields, or use ASCII
# roman numerals where the canonical JP form uses Unicode (Ⅰ Ⅱ Ⅲ).
# Examples surfaced during the cfg refactor:
#
#   "鐵炮大將" (CHT 鐵+將) should be "鉄炮大将" (JP 鉄+将)
#   "剛猛I"   (ASCII I)   should be "剛猛Ⅰ"   (Unicode Ⅰ)
#
# When this file lists `<wrong_key>: <correct_key>`, merge_sources.py
# treats the two as the same entity for matching and reports the entries
# under the corrected key. The wrong-key entry stays in the source yaml
# until the user manually renames (this file is non-destructive).
#
# merge_sources.py emits suggested entries to
# .build/key_normalization_candidates.yaml after each run; manually move
# verified ones here.

trait_key_alias: {}

skill_key_alias: {}

hero_key_alias: {}
