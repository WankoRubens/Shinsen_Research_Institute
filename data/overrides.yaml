    vars:
      dmg1:
        base: 0.58
        max: 1.08
      silence_prob: 0.4
      duration: 1
      heal:
        base: 0.39
        max: 0.78
      extra_prob: 0.5
      dmg2:
        base: 0.54
        max: 1.08
      prob_inc: 0.1
      max_stacks: 3
    _action: add
    unique_hero: 柿崎景家
    is_unique: true
  疾風迅雷:
