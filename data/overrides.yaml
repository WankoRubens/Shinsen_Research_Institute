    activation_rate: 1
    description: 行動前，有{var:prob}{scale:統率}機率對自身和敵軍單體施加{status:封擊}狀態，若自身處於{status:無策}狀態，改為施加{status:無策}狀態
      (若同時處於{status:封擊}與{status:無策}狀態，施加兩種狀態)。除自身外若我軍仍有武將存活，使敵軍目標為自身分擔{var:share}{scale:統率}的傷害，持續{var:round}回合
    commander_description: 分擔傷害的比例提升至{var:cmdr_share}{scale:統率}
    vars:
      prob:
        base: 0.15
        max: 0.3
      share:
        base: 0.02
        max: 0.04
      cmdr_share:
        base: 0.035
        max: 0.07
      round: 2
    _action: add
    unique_hero: 伊達輝宗
    is_unique: true
  同盟姻親:
    name: 同盟姻親
    type: 主動
    rarity: S
    activation_rate: 40%
    description: 使自身與異性友軍單體受到傷害降低{var:damage_reduction}（{scale:智略}）， 並分擔{var:damage_share}其受到的傷害，持續{var:duration}回合。
    tags:
    - 增益
    - 提升屬性
    - 主動發動
    raw_text: 同盟姻親 (S) 種類： 主動 | 增益 發動機率： 40% 效果： 使自身與異性友軍單體受到傷害降低10%->20%（受智略影響），並分擔10%->20%其受到的傷害，持續2回合
    vars:
      damage_reduction:
        base: 0.1
        max: 0.2
      damage_share:
        base: 0.1
        max: 0.2
      duration: 2
    battle:
      type: 主動
      trigger: beforeAction
      rate: 0.4
      do:
      - to: allyMultiple
        count: 2
        do:
        - type: buff
          stat: damage_reduction
          value: $damage_reduction
          scale: 智略
          duration: $duration
        - type: buff
          stat: damage_share
          value: $damage_share
          scale: 智略
          duration: $duration
    is_event_skill: true
    _action: add
  離心背道:
    name: 離心背道
    type: 主動
    rarity: S
    activation_rate: 35%
    description: 準備{var:prep_turns}回合，對敵方大將造成{var:damage_rate}兵刃傷害， 並使其造成的傷害降低{var:damage_debuff}，持續{var:debuff_duration}回合。
    tags:
    - 兵刃傷害
    - 單體傷害
    - 減益
    - 主動發動
    raw_text: 離心背道 (S) 種類： 主動 | 兵刃單體 發動機率： 35% 效果： 準備1回合，對敵方大將造成兵刃傷害（傷害率176%->252%），並使其造成的傷害降低25%->50%，持續2回合
    vars:
      prep_turns: 1
      damage_rate:
        base: 1.76
        max: 2.52
      damage_debuff:
        base: 0.25
        max: 0.5
      debuff_duration: 2
    battle:
      type: 主動
      trigger: beforeAction
      rate: 0.35
      prepTurns: 1
      do:
      - to: enemySingle
        targetRole: commander
        do:
        - type: damage
          damage_type: 兵刃傷害
          value: $damage_rate
        - type: debuff
          stat: damage_output
          value: $damage_debuff
          duration: $debuff_duration
    is_event_skill: true
    _action: add
  疑兵盜城:
    name: 疑兵盜城
    type: 主動
    rarity: S
    activation_rate: 35%
    description: 使自身智略增加{var:intelligence_buff}點（{scale:智略}），持續{var:buff_duration}回合，
      並使敵軍群體（2-3人）下次受到謀略傷害時，額外受到謀略傷害{var:extra_damage_rate}（{scale:智略}），持續{var:debuff_duration}回合。
    tags:
    - 謀略傷害
    - 群體傷害
    - 增益
    - 減益
    - 主動發動
    - 智略系
    raw_text: 疑兵盜城 (S) 種類： 主動 | 謀略群體 發動機率： 35% 效果： 使自身智略增加16.5->33點（受智略影響），持續2回合，並使敵軍群體（2-3人）下次受到謀略傷害時，額外受到謀略傷害（傷害率53%->106%，受智略影響），持續2回合
    vars:
      intelligence_buff:
        base: 16.5
        max: 33
        type: flat
      buff_duration: 2
      extra_damage_rate:
        base: 0.53
        max: 1.06
      debuff_duration: 2
      target_count: 3
    battle:
      type: 主動
      trigger: beforeAction
      rate: 0.35
      do:
      - to: self
        do:
        - type: buff
          stat: 智略
          value: $intelligence_buff
          scale: 智略
          duration: $buff_duration
      - to: enemyMultiple
        countMin: 2
        countMax: 3
        do:
        - type: debuff
          stat: next_mou_damage_taken
          value: $extra_damage_rate
          scale: 智略
          duration: $debuff_duration
    is_event_skill: true
    _action: add
  乘虛而入:
    name: 乘虛而入
    type: 突擊
    rarity: S
    activation_rate: 35%
    description: 普通攻擊之後，降低攻擊目標武勇與智略{var:stat_debuff}點，持續{var:debuff_duration}回合。 此外，若目標已處於{status:挑釁}或{status:牽制}狀態，則使自身獲得{var:dodge_rate}{status:閃避}狀態，
      否則使攻擊目標進入{status:挑釁}及{status:牽制}狀態，持續{var:debuff_duration}回合。
    tags:
    - 控制
    - 降低屬性
    - 施加狀態
    - 突擊觸發
    - 武勇系
    - 智略系
    raw_text: 乘虛而入 (S) 種類： 突擊 | 控制 發動機率： 35% 效果： 普通攻擊之後，降低攻擊目標武勇與智略70->140點，持續1回合。此外，若目標已處於挑釁或牽制狀態，則使自身獲得17.5%->35%規避狀態，否則使攻擊目標進入挑釁及牽制狀態，持續1回合。
    vars:
      stat_debuff:
        base: 70
        max: 140
        type: flat
      debuff_duration: 1
      dodge_rate:
        base: 0.175
        max: 0.35
      dodge_duration: 1
    battle:
      type: 突擊
      trigger: afterAttack
      rate: 0.35
      do:
      - to: enemySingle
        do:
        - type: debuff
          stat: 武勇
          value: $stat_debuff
          duration: $debuff_duration
        - type: debuff
          stat: 智略
          value: $stat_debuff
          duration: $debuff_duration
        - type: conditional
          condition: target_has_status(挑釁) || target_has_status(牽制)
          on_true:
          - type: applyStatus
            status: 閃避
            value: $dodge_rate
            duration: $dodge_duration
          on_false:
          - type: applyStatus
            status: 挑釁
            duration: $debuff_duration
          - type: applyStatus
            status: 牽制
            duration: $debuff_duration
    is_event_skill: true
    _action: add
  大器之蘊:
    name: 大器之蘊
    type: 指揮
    rarity: A
    activation_rate: 100%
    description: 第{var:start_turn}回合起，每回合恢復我軍群體（{var:target_count}人）兵力{var:heal_rate}（{scale:智略}）。
    tags:
    - 治療
    - 增益
    - 指揮效果
    - 智略系
    - 回合觸發
    raw_text: 大器之蘊 (A) 種類： 指揮 | 治療 發動機率： 100% 效果： 第5回合起，每回合恢復我軍群體（2人）兵力（恢復率54%->108%，受智略影響）。
    vars:
      heal_rate:
        base: 0.54
        max: 1.08
      start_turn: 5
      target_count: 2
    battle:
      type: 指揮
      trigger: turnStart
      when: turn >= 5
      rate: 1.0
      do:
      - to: allyMultiple
        count: 2
        do:
