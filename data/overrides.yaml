  天神山殘照:
    name: 天神山殘照
    name_jp: 天神山残照
    type: 被動
    rarity: S
    target: 自身
    activation_rate: 100%
    description: 普通攻擊後有{var:normal_atk_chance}機率對目標造成{var:normal_atk_dmg}謀略傷害（{scale:智略}）。
      戰鬥前4回合，每回合行動前使自身武勇和智略增加{var:stat_buff}點（{scale:智略}），持續{var:duration}回合，每回合增加的屬性減少{var:stat_reduction}。
      第5回合開始時，使智略最高的友軍單體進入{status:混亂}狀態，持續1回合。
    commander_description: 獲得屬性的回合數改為{var:commander_rounds}，屬性減少的值改為{var:commander_reduction}。
    brief_description: 普通攻擊觸發謀略傷害並提升屬性
    description_jp: 通常攻撃後、{var:normal_atk_chance}の確率で目標に{var:normal_atk_dmg}の計略ダメージを与える（{scale:知略}）。戦闘開始から4ターンの間、毎ターン行動前に自身の武勇と知略を{var:stat_buff}上昇させる（{scale:知略}）。{var:duration}ターン持続し、毎ターン上昇量は{var:stat_reduction}ずつ減少する。第5ターン開始時、知略が最も高い友軍単体に{status:混乱}を1ターン付与する。
    commander_description_jp: 属性を獲得する回数が{var:commander_rounds}回になり、属性減少値が{var:commander_reduction}になる。
    brief_description_jp: 通常攻撃後に計略ダメージを与え、序盤は自身の能力を上昇
    tags:
    - 謀略傷害
    - 單體傷害
    - 增益
    - 提升屬性
    - 控制
    - 被動觸發
    - 智略系
    - 大將技
    raw_text: '天神山殘照 (S) 種類： 被動戰法 | 增益 發動機率：--

      效果： 普通攻擊後有25%->50%機率對目標造成謀略傷害（傷害率106%->218%，受智略影響）。戰鬥前4回合，每回合行動前使自身武勇和智略增加30->60點（受智略影響），持續1回合，每回合增加的屬性減少25%。第5回合開始時，使智略最高的友軍單體進入混亂狀態，持續1回合

      大將技： 獲得屬性的回合數改為5，屬性減少的值改為20%'
    duration: 1
    vars:
      normal_atk_chance:
        base: 0.25
        max: 0.5
      normal_atk_dmg:
        base: 1.06
        max: 2.18
      stat_buff:
        base: 30
        max: 60
        type: flat
      stat_reduction: 0.25
      commander_rounds: 5
      commander_reduction: 0.2
      base_rounds: 4
      base_reduction: 0.25
    battle:
      type: 被動
      trigger: always
      do:
      - trigger: afterAttack
        to: enemySingle
        do:
        - type: roll
          chance: $normal_atk_chance
          on_success:
          - type: damage
            damage_type: 謀略傷害
            value: $normal_atk_dmg
            scale: 智略
      - trigger: turnStart
        when: turn <= 4
        to: self
        do:
        - type: buff
          stat: 武勇
          value: $stat_buff
          scale: 智略
          duration: $duration
        - type: buff
          stat: 智略
          value: $stat_buff
          scale: 智略
          duration: $duration
        - type: applyStack
          stack: stat_buff_decay
          value: $stat_reduction
      - trigger: turnStart
        when: turn == 5
        to: allyMultiple
        order_by: 智略
        count: 1
        do:
        - type: applyStatus
          status: 混亂
          duration: 1
    unique_hero: 浦上宗景
    is_unique: true
    _action: add
