# cfg internal-inconsistency aliases.
#
# When merge_sources.py joins user data to cfg.json, it tries multiple
# strategies in order:
#   1. multi_lang.id   == cfg.skill.name   (most common — handles roman/ASCII)
#   2. norm(zh-hans)   == norm(cfg.skill.name) (display-name fallback)
#   3. norm(zh-hant)   == norm(cfg.skill.name)
#   4. norm(jp_key)    == norm(cfg.skill.name)
#   5. THIS FILE       (manual alias for cfg cases the resolver misses)
#
# Add an entry here only when a user-side JP key maps to a cfg.skill or
# cfg.hero whose name differs in a way the four strategies above can't
# reconcile. cfg_diff.py will surface candidates after each cfg refresh.
#
# Format: jp_key (or zh-hans literal) on the left, cfg.skill.name on the
# right.

skill_name_alias: {}

hero_name_alias: {}
